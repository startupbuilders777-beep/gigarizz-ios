name: GigaRizz
options:
  bundleIdPrefix: com.gigarizz
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    SWIFT_EMIT_LOC_STRINGS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    ENABLE_PREVIEWS: YES

packages:
  FirebaseAuth:
    url: https://github.com/firebase/firebase-ios-sdk
    version: 11.6.0
  Purchases:
    url: https://github.com/RevenueCat/purchases-ios
    version: 4.44.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    version: 3.10.0
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    version: 8.1.3
  SnapKit:
    url: https://github.com/SnapKit/SnapKit
    version: 5.7.1

targets:
  GigaRizz:
    type: application
    platform: iOS
    sources:
      - path: GigaRizz/Sources
      - path: GigaRizz/Resources
    dependencies:
      - package: FirebaseAuth
        product: FirebaseAuth
      - package: FirebaseAuth
        product: FirebaseFirestore
      - package: FirebaseAuth
        product: FirebaseStorage
      - package: Purchases
        product: RevenueCat
      - package: PostHog
        product: PostHog
      - package: Kingfisher
        product: Kingfisher
      - package: SnapKit
        product: SnapKit
    info:
      path: GigaRizz/Resources/Info.plist
      properties:
        CFBundleDisplayName: GigaRizz
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "GigaRizz needs access to your photos to generate AI-enhanced dating photos."
        NSPhotoLibraryAddUsageDescription: "GigaRizz saves your generated photos to your photo library."
        NSCameraUsageDescription: "GigaRizz uses your camera to capture photos for AI enhancement."
        NSMicrophoneUsageDescription: "GigaRizz may use the microphone for voice features."
        UIBackgroundModes:
          - fetch
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gigarizz.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

schemes:
  GigaRizz:
    build:
      targets:
        GigaRizz: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
